<!DOCTYPE html>
<html>
<head>
  <title>Certificates</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(135deg,#d6fffb, #eadcff);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}
h1 {
    font-size: 3rem;
    font-weight: bold;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    color: green;
text-align:center;
}

   
        .cert-box {
      background: #fff9c4;
      border-radius: 10px;
      padding: 20px;

      font-weight: 500;
      transition: 0.3s;
    }

    .cert-box:hover {
      transform: scale(1.05);
      background: #d6eaff;
    }
  </style>
</head>

<body>
<h1> My Certificates</h1>

<div class="container">

   <div class="row g-4">
            <div class="col-6">
        <div class="cert-box">python Essentials ➖ Cisco</div>
      </div>

      <div class="col-6">
        <div class="cert-box">Quantum Computing ,Python ,IOT ➖ NPTEL</div>
      </div>

      <div class="col-6">
        <div class="cert-box">Introduction to MS Excel ➖ Microsoft</div>
      </div>

      <div class="col-6">
        <div class="cert-box">Trust and Security with Goolge Cloud ➖ Google Cloud</div>
      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
